<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>OAuth 2.0 + OIDC Demo</title>
</head>
<body>
  <h1>OAuth 2.0 + OIDC Demo :)</h1>

  <div id="login-panel" style="display:none">
    <a href="/oauth2/authorization/google">Увійти через Google</a>
  </div>
  <div id="profile-panel" style="display:none">
    <img id="avatar" src="" alt="avatar" width="100">
    <p id="user-name"></p>
    <p id="user-email"></p>
    <pre id="all-claims"></pre>
    <form method="post" action="/logout">
      <button type="submit">Вийти</button>
    </form>
  </div>
  <script>

  const params = new URLSearchParams(window.location.search);

  if (params.has('logout')) {
      document.getElementById('login-panel').style.display = 'block';
  }

  fetch('/me', { credentials: 'same-origin' })
    .then(res => {
      if (!res.ok) {
        document.getElementById('login-panel').style.display = 'block';
        return null;
      }
      return res.json();
    })
    .then(data => {
      if (!data) return;

      document.getElementById('login-panel').style.display = 'none';
      document.getElementById('profile-panel').style.display = 'block';

      document.getElementById('avatar').src = data.picture || '';
      document.getElementById('user-name').textContent = data.name;
      document.getElementById('user-email').textContent = data.email;
      document.getElementById('all-claims').textContent = JSON.stringify(data, null, 2);
    });

</script>
</body>
</html>
